<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Maldits❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Inter;
background: linear-gradient(135deg,#fff1f2,#fff7ed,#e0f2fe,#fdf2f8);
overflow-x:hidden;
}

/* WRAPPER */
.wrapper{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:45px;
padding:70px 20px 10px;
}

/* CAKE */
#cakeScene{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.cake{
width:170px;height:150px;position:relative;
filter:drop-shadow(0 20px 40px rgba(0,0,0,0.15));
}

.layer1,.layer2,.layer3{
position:absolute;width:100%;border-radius:12px;
}

.layer1{bottom:0;height:55px;background:#ffb3c6;}
.layer2{bottom:50px;height:45px;background:#ffd6a5;width:85%;left:7.5%;}
.layer3{bottom:95px;height:35px;background:#caffbf;width:70%;left:15%;}

.candle{
position:absolute;width:8px;height:22px;background:#fff;
top:-28px;left:50%;transform:translateX(-50%);
}

.flame{
position:absolute;width:10px;height:10px;background:orange;
border-radius:50%;top:-40px;left:50%;
transform:translateX(-50%);
animation:flicker .4s infinite alternate;
}

@keyframes flicker{
from{transform:translateX(-50%) scale(1);}
to{transform:translateX(-50%) scale(1.3);}
}

/* ===================== */
/* 💌 3D FLIP ENVELOPE */
/* ===================== */

#letterScene{display:none;}

.scene{
perspective:1200px;
}

.envelope{
width:280px;
height:180px;
position:relative;
transform-style:preserve-3d;
transition:transform 1s;
cursor:pointer;
}

.envelope.open{
transform:rotateX(180deg);
}

.front, .back{
position:absolute;
width:100%;
height:100%;
border-radius:14px;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 30px 80px rgba(0,0,0,0.15);
}

.front{
background:white;
}

.front:before{
content:"";
position:absolute;
top:0;
width:100%;
height:50%;
background:#ffe4ec;
clip-path: polygon(0 0,100% 0,50% 100%);
}

.back{
background:white;
transform:rotateX(180deg);
padding:20px;
flex-direction:column;
}

/* LETTER TEXT */
.title{
font-family:"Playfair Display";
font-size:22px;
margin-bottom:10px;
}

.text{
font-size:14px;
line-height:1.7;
color:#444;
}

/* TYPEWRITER CURSOR */
.cursor{
display:inline-block;
width:2px;
background:black;
animation:blink .7s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

/* GALLERY */
.memories{
padding:40px 20px 60px;
max-width:900px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

/* BALLONS */
.balloon{
position:fixed;
bottom:-120px;
width:26px;
height:36px;
border-radius:50%;
animation:floatUp 6s linear forwards;
z-index:9999;
}

@keyframes floatUp{
to{transform:translateY(-120vh);}
}

/* CONFETTI */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:99999;
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="wrapper">

<!-- CAKE -->
<div id="cakeScene" onclick="start()">
    <div class="cake">
        <div class="layer3"></div>
        <div class="layer2"></div>
        <div class="layer1"></div>
        <div class="candle"></div>
        <div class="flame"></div>
    </div>
    <h2>Happy Birthday ❤️</h2>
    <p>Tap the cake 🎂</p>
</div>

<!-- LETTER -->
<div id="letterScene">
    <div class="scene">
        <div class="envelope" id="env" onclick="openLetter()">

            <div class="front"></div>

            <div class="back">
                <div class="title">For You ❤️</div>
                <div class="text" id="typedText"></div>
            </div>

        </div>
    </div>
</div>

</div>

<!-- GALLERY -->
<div class="memories">
<div class="grid">

<div class="card"><img src="./c55fab87-4472-40db-b022-8fee1daddbf1.jpg"></div>
<div class="card"><img src="./e635b2d5-dac6-4586-90de-a30c2534e2c7.jpg"></div>
<div class="card"><img src="./18731e28-c309-425d-92e8-ecc5d6122127.jpg"></div>
<div class="card"><img src="./f486b4e1-6f3e-4f5e-800d-de37e673f485.jpg"></div>

</div>
</div>

<script>

/* START + CONFETTI */
function start(){
document.getElementById("cakeScene").style.display="none";
document.getElementById("letterScene").style.display="flex";
launchConfetti();
}

/* ENVELOPE FLIP + TYPEWRITER */
function openLetter(){
const env=document.getElementById("env");
env.classList.toggle("open");

if(env.classList.contains("open")){
typeWriter();
}
}

/* TYPEWRITER */
const text="Hello Maldits ❤️\nHappy 22nd Birthday Pretty Girl.\nI hope your day is full of love, smiles, and blessings. Stay pretty always.";
let i=0;

function typeWriter(){
const el=document.getElementById("typedText");
el.innerHTML="";
i=0;

function typing(){
if(i < text.length){
el.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
i++;
setTimeout(typing,40);
}
}
typing();
}

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

function launchConfetti(){
for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:-20,
r:Math.random()*6+2,
d:Math.random()*5+2,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
animateConfetti();
}

function animateConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach((p,i)=>{
p.y += p.d;
p.x += Math.sin(p.y*0.01);

ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

if(p.y>canvas.height) pieces.splice(i,1);
});

requestAnimationFrame(animateConfetti);
}

</script>

</body>
</html>
